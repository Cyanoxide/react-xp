name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      # npm records the react-solitaire git dependency as an ssh URL; rewrite it
      # to https so the runner (which has no ssh key) can clone the public repo
      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm install
      - name: Type-check and Build
        run: npm run build

      - name: Lint check
        run: npm run lint